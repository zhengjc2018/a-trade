name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Smoke import
        run: |
          python -c "import atrade; from atrade.notify import split_markdown_by_bytes; print('import OK')"

      - name: Ruff
        run: |
          ruff check atrade/ tests/

      - name: Pytest
        env:
          QQ_BOT_APPID: ci-placeholder
          QQ_BOT_APPSECRET: ci-placeholder
          QQ_BOT_QQ: ci-placeholder
          QQ_TARGET_GROUP: ci-placeholder
        run: |
          pytest --cov=atrade --cov-report=term-missing --cov-fail-under=60

      - name: Compile check
        run: |
          python -m compileall -q atrade/

      - name: Shell syntax check
        run: |
          bash -n scripts/vps_install_deploy_target.sh
          bash -n scripts/vps_update_worktree.sh
          bash -n scripts/install_pre_push_env_sync.sh
          bash -n scripts/pre_push_sync_env.sh

      - name: CLI --help smoke
        run: |
          python scripts/screen.py --help
          python scripts/run_backtest.py --help
          python scripts/run_per_symbol_report.py --help
